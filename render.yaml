services:
  - type: web
    name: botwp
    runtime: docker
    dockerfilePath: ./Dockerfile
    scaling:
      minInstances: 1
      maxInstances: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
      - key: MY_WHATSAPP_ID
        sync: false
